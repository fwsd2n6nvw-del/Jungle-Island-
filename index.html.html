<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Island World Bridge Master</title>
<style>
:root{
  --bg:#111;--panel:#1b1b1b;--line:#333;--text:#eee;--muted:#aaa;
  --ocean:#3b82f6;--river:#7dd3fc;--bridge:#050505;--shore:#cdbb7c;
  --rich:#5c3b1e;--poor:#b6814f;--corridor:#806f56;--grass:#4f7d2a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;padding:10px}
h1{text-align:center;font-size:22px;margin:6px 0 10px}
#top,#history,#events,#diaries{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px}
#top{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;align-items:center}
button{background:#2b2b2b;color:#eee;border:1px solid #555;border-radius:8px;padding:8px 10px;cursor:pointer}
button:hover{background:#3a3a3a}.active{outline:2px solid #eee}
#wrap{display:grid;grid-template-columns:minmax(320px,1fr) 300px;gap:10px;align-items:start}
#mapPanel{background:#0b0b0b;border:1px solid var(--line);border-radius:10px;padding:10px;overflow:auto}
#map{display:grid;grid-template-columns:30px repeat(15,42px);grid-template-rows:30px repeat(15,42px);width:max-content;margin:auto;background:#000;border:1px solid #222}
.coord{display:flex;align-items:center;justify-content:center;background:#050505;color:#eee;font-weight:bold;border:1px solid #222;font-size:13px}
.tile{position:relative;width:42px;height:42px;border:1px solid rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.tile.grass{background:#4f7d2a}.tile.forest{background:#28561e}.tile.jungle{background:#184015}.tile.shore{background:var(--shore)}.tile.ocean{background:var(--ocean)}.tile.river{background:var(--river)}.tile.bridge{background:var(--bridge)}.tile.rocky{background:#877c6a}.tile.garden{background:#31551d}.tile.ruin{background:#6f6f6f}
.tile.rich::after{content:"";position:absolute;inset:3px;border:2px solid rgba(255,220,60,.5);border-radius:4px;pointer-events:none}
.tile.buff::before{content:"";position:absolute;inset:0;background:rgba(255,230,80,.15);pointer-events:none}
.bridgeIcon{width:34px;height:18px;background:#050505;border:2px solid #222;border-left:4px solid #111;border-right:4px solid #111;box-shadow:0 0 0 1px #444 inset;z-index:2}
.agent{position:absolute;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:bold;border:2px solid #fff;z-index:5;transform:translate(0,0)}
#side{display:flex;flex-direction:column;gap:10px}.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}.card h2{font-size:16px;margin:0 0 8px}.small{font-size:13px;color:var(--muted);line-height:1.4}.row{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #2a2a2a;padding:4px 0}.badge{display:inline-block;border:1px solid #555;border-radius:999px;padding:2px 7px;margin:2px;background:#222;font-size:12px}.log{max-height:160px;overflow:auto;font-size:13px;line-height:1.35}.agentCard{display:grid;grid-template-columns:24px 1fr;gap:8px;margin:7px 0;border-bottom:1px solid #2a2a2a;padding-bottom:7px}.dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:12px}.bar{height:7px;background:#333;border-radius:8px;overflow:hidden;margin-top:3px}.fill{height:100%;background:#aaa}code{color:#d6e4ff}
@media(max-width:900px){#wrap{grid-template-columns:1fr}#side{grid-template-columns:1fr}.tile{width:34px;height:34px}#map{grid-template-columns:28px repeat(15,34px);grid-template-rows:28px repeat(15,34px)}}
</style>
</head>
<body>
<h1>Island World — Bridge Master</h1>
<div id="top">
  <button id="pauseBtn">Pause</button><button data-speed="900">Slow</button><button data-speed="450" class="active">Normal</button><button data-speed="120">Fast</button><button id="locustBtn">Locust Invasion</button>
  <span>Day: <b id="dayOut">1</b></span><span>Time: <b id="timeOut">Day</b></span><span>Rule: <b>North Bridge is the only river crossing</b></span>
</div>
<div id="wrap">
  <div id="mapPanel"><div id="map"></div></div>
  <div id="side">
    <div class="card"><h2>Landmarks</h2><div id="landmarks"></div></div>
    <div class="card"><h2>Tile Info</h2><div id="info" class="small">Tap a tile.</div></div>
    <div class="card"><h2>Agents</h2><div id="agents"></div></div>
    <div class="card"><h2>Last Three Actions</h2><div id="actions" class="log"></div></div>
    <div class="card"><h2>Event Log</h2><div id="eventLog" class="log"></div></div>
  </div>
</div>
<div id="diaries"><h2>Agent Diaries</h2><div id="diaryLog" class="log">UI record only — does not affect learning</div></div>
<script>
const W=15,H=15,INFO_TRUST_DAYS=20;
const COLORS={Pollock:'#ef4444',Rembrandt:'#22c55e',Maya:'#eab308'};
let day=1,tick=0,paused=false,speed=450,timer=null,selected=null;
const RIVER_TILES=[
  {x:7,y:0},{x:7,y:1},{x:7,y:2},{x:8,y:3},{x:7,y:4},{x:7,y:5},{x:6,y:6},{x:6,y:7},{x:7,y:8},{x:8,y:9}
];
const BRIDGE_TILE={x:7,y:4};
const LANDMARKS=[{name:'North Bridge',type:'bridge',x:7,y:4,description:'The only way to cross the northern river.'}];
const STRUCTURES=[{x:11,y:5,type:'hut',icon:'🛖'},{x:10,y:6,type:'hut',icon:'🛖'},{x:11,y:7,type:'campfire',icon:'🔥'},{x:10,y:7,type:'well',icon:'🕳️'},{x:11,y:10,type:'ruin',icon:'▣'},{x:3,y:11,type:'gate',icon:'⌗'}];
const GARDENS=[{x:9,y:6},{x:10,y:6},{x:9,y:7},{x:10,y:7}];
const RESOURCES=[
{x:2,y:1,kind:'fruit',icon:'🍌'},{x:5,y:1,kind:'fruit',icon:'🍊'},{x:10,y:1,kind:'fruit',icon:'🍌'},{x:12,y:4,kind:'fruit',icon:'🍌'},
{x:3,y:5,kind:'berries',icon:'🍓'},{x:8,y:5,kind:'berries',icon:'🫐'},{x:12,y:8,kind:'berries',icon:'🍓'},{x:5,y:12,kind:'berries',icon:'🌺'},
{x:4,y:9,kind:'coconuts',icon:'🥥'},{x:12,y:12,kind:'coconuts',icon:'🥥'},{x:5,y:10,kind:'flowers',icon:'🌼'}];
let world=[],events=[],actions=[],diaries=[];
let agents=[
  makeAgent('Pollock',2,10),makeAgent('Rembrandt',12,12),makeAgent('Maya',4,4)
];
function makeAgent(name,x,y){return {name,x,y,food:70,water:70,energy:80,map:{},knownLandmarks:{},last:'woke up',color:COLORS[name]};}
function inBounds(x,y){return x>=0&&y>=0&&x<W&&y<H}function key(x,y){return x+','+y}function tileAt(x,y){return inBounds(x,y)?world[y][x]:null}function isRiverCoord(x,y){return RIVER_TILES.some(p=>p.x===x&&p.y===y)}function dist(a,b,c,d){return Math.abs(a-c)+Math.abs(b-d)}
function initWorld(){world=[];for(let y=0;y<H;y++){let row=[];for(let x=0;x<W;x++){let edge=x===0||y===0||x===W-1||y===H-1;let t={x,y,terrain:edge?'shore':'grass',walkable:true,resource:0,resourceBuff:false,structure:null,landmark:null,icon:''};if((x<2&&y>7)||(x>12&&y<3))t.terrain='jungle';else if(Math.random()<.18)t.terrain='forest';else if(Math.random()<.07)t.terrain='jungle';row.push(t)}world.push(row)}
  for(const p of [{x:1,y:5},{x:4,y:7},{x:6,y:11},{x:12,y:3},{x:13,y:7}]) tileAt(p.x,p.y).terrain='rocky';
  for(const g of GARDENS){let t=tileAt(g.x,g.y);t.terrain='garden';t.resource=8;t.icon='▦'}
  for(const s of STRUCTURES){let t=tileAt(s.x,s.y);t.structure=s.type;t.icon=s.icon;if(s.type==='ruin')t.terrain='ruin'}
  for(const r of RESOURCES){let t=tileAt(r.x,r.y);t.resource=7;t.resourceKind=r.kind;t.icon=r.icon;t.terrain=t.terrain==='grass'?'forest':t.terrain}
  applyRiverAndBridge();applyRiverBuffs();logEvent('World created. North Bridge is active as the only crossing.');}
function applyRiverAndBridge(){for(const p of RIVER_TILES){let t=tileAt(p.x,p.y);if(!t)continue;t.terrain='river';t.walkable=false;t.resourceBuff=true;t.structure=null;t.icon='';}
  let b=tileAt(BRIDGE_TILE.x,BRIDGE_TILE.y);b.terrain='bridge';b.walkable=true;b.landmark='North Bridge';b.resourceBuff=true;b.icon='';}
function applyRiverBuffs(){for(let y=0;y<H;y++)for(let x=0;x<W;x++){let t=tileAt(x,y);if(!t||t.terrain==='river'||t.terrain==='bridge')continue;if(hasRiverBuff(x,y)){t.resourceBuff=true;t.resource=Math.max(t.resource,4)}}}
function hasRiverBuff(x,y){for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){if(dx===0&&dy===0)continue;let t=tileAt(x+dx,y+dy);if(t&&(t.terrain==='river'||t.terrain==='bridge'))return true;}return false;}
function isWalkable(x,y){let t=tileAt(x,y);if(!t)return false;if(t.terrain==='river')return false;if(t.terrain==='bridge')return true;return t.walkable!==false;}
function renderMap(){const map=document.getElementById('map');map.innerHTML='';map.appendChild(coord('X'));for(let x=0;x<W;x++)map.appendChild(coord(String(x).padStart(2,'0')));for(let y=0;y<H;y++){map.appendChild(coord(String(y).padStart(2,'0')));for(let x=0;x<W;x++){let t=tileAt(x,y),d=document.createElement('div');d.className='tile '+t.terrain+(t.resource>=7?' rich':'')+(t.resourceBuff?' buff':'');d.title=`(${String(x).padStart(2,'0')},${String(y).padStart(2,'0')}) ${t.terrain}`;d.onclick=()=>{selected={x,y};renderInfo()};if(t.terrain==='bridge'){let br=document.createElement('div');br.className='bridgeIcon';d.appendChild(br)}else if(t.icon)d.textContent=t.icon;for(const a of agents.filter(a=>a.x===x&&a.y===y)){let e=document.createElement('div');e.className='agent';e.style.background=a.color;e.textContent=a.name[0];d.appendChild(e)}map.appendChild(d)}}}
function coord(s){let d=document.createElement('div');d.className='coord';d.textContent=s;return d;}
function renderSide(){document.getElementById('dayOut').textContent=day;document.getElementById('timeOut').textContent=day%2===0?'Night':'Day';document.getElementById('landmarks').innerHTML=LANDMARKS.map(l=>`<div class="row"><span>⭐ ${l.name}</span><span>(${String(l.x).padStart(2,'0')},${String(l.y).padStart(2,'0')})</span></div><div class="small">${l.description}</div>`).join('');document.getElementById('agents').innerHTML=agents.map(a=>`<div class="agentCard"><div class="dot" style="background:${a.color}">${a.name[0]}</div><div><b>${a.name}</b> <span class="small">(${String(a.x).padStart(2,'0')},${String(a.y).padStart(2,'0')})</span><div class="small">${a.last}</div>${bar('Food',a.food)}${bar('Water',a.water)}${bar('Energy',a.energy)}<span class="badge">known tiles ${Object.keys(a.map).length}</span><span class="badge">landmarks ${Object.keys(a.knownLandmarks).length}</span></div></div>`).join('');document.getElementById('actions').innerHTML=actions.slice(-3).reverse().join('<hr>');document.getElementById('eventLog').innerHTML=events.slice(-12).reverse().join('<br>');document.getElementById('diaryLog').innerHTML=diaries.slice(-20).reverse().join('<br>');renderInfo();}
function bar(name,v){return `<div class="small">${name}: ${Math.round(v)}<div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(100,v))}%"></div></div></div>`}
function renderInfo(){let el=document.getElementById('info');if(!selected){el.textContent='Tap a tile.';return}let t=tileAt(selected.x,selected.y);let txt=`<b>Tile:</b> ${t.terrain} (${String(t.x).padStart(2,'0')},${String(t.y).padStart(2,'0')})<br>`;if(t.landmark)txt+=`<b>Landmark:</b> ${t.landmark}<br><b>Type:</b> Bridge<br>The only way to cross the river.<br>`;if(t.terrain==='river')txt+=`<b>Movement:</b> blocked river tile<br>`;if(t.terrain==='bridge')txt+=`<b>Movement:</b> walkable crossing<br>`;txt+=`<b>Resource:</b> ${t.resource}<br><b>River buff:</b> ${t.resourceBuff?'yes':'no'}<br>`;if(t.structure)txt+=`<b>Structure:</b> ${t.structure}<br>`;el.innerHTML=txt;}
function step(){if(paused)return;tick++;if(tick%10===0)day++;for(const a of agents){agentTurn(a)}if(tick%5===0)socializeAtHuts();renderMap();renderSide();}
function agentTurn(a){a.food-=.5;a.water-=.65;a.energy-=day%2===0?.9:.45;rememberTile(a);if(tileAt(a.x,a.y).resource>0&&Math.random()<.45){let t=tileAt(a.x,a.y);let gain=t.resourceBuff?16:10;if(t.terrain==='garden')gain+=10;a.food=Math.min(100,a.food+gain);a.last=`gathered food near ${t.terrain}${t.resourceBuff?' with river buff':''}`;addAction(a);return}if(a.water<55){let next=moveToward(a,BRIDGE_TILE.x,BRIDGE_TILE.y);if(next){move(a,next.x,next.y);a.water=Math.min(100,a.water+2);a.last='moved toward North Bridge and river water';addAction(a);return}}
  let options=neighbors(a.x,a.y).filter(p=>isWalkable(p.x,p.y));if(options.length){let p=options[Math.floor(Math.random()*options.length)];move(a,p.x,p.y);a.last=tileAt(a.x,a.y).terrain==='bridge'?'crossed North Bridge':'explored the island';addAction(a)}if(a.food<20||a.water<20){diary(`${a.name}: I need supplies. The river helps, but only the North Bridge crosses it.`)}}
function rememberTile(a){let t=tileAt(a.x,a.y);a.map[key(a.x,a.y)]={terrain:t.terrain,resource:t.resource,resourceBuff:t.resourceBuff,day};if(t.landmark){a.knownLandmarks[t.landmark]={x:a.x,y:a.y,day};diary(`${a.name}: I found ${t.landmark}. It is the only crossing.`)}}
function memoryFreshness(rec){if(!rec)return 0;return Math.max(0,INFO_TRUST_DAYS-(day-rec.day))/INFO_TRUST_DAYS;}
function neighbors(x,y){return [{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>inBounds(p.x,p.y))}
function move(a,x,y){if(isWalkable(x,y)){a.x=x;a.y=y}}
function moveToward(a,tx,ty){let opts=neighbors(a.x,a.y).filter(p=>isWalkable(p.x,p.y));opts.sort((p,q)=>dist(p.x,p.y,tx,ty)-dist(q.x,q.y,tx,ty));return opts[0]}
function socializeAtHuts(){for(const h of STRUCTURES.filter(s=>s.type==='hut')){let near=agents.filter(a=>dist(a.x,a.y,h.x,h.y)<=2);if(near.length>=2){for(const a of near){for(const b of near){if(a!==b){Object.assign(a.knownLandmarks,b.knownLandmarks);let entries=Object.entries(b.map).filter(([k,v])=>memoryFreshness(v)>0);for(const [k,v] of entries.slice(0,2))a.map[k]=v;}}}diary(`At the beach huts, agents shared useful map data about fresh resources and landmarks.`)}}}
function addAction(a){actions.push(`<b>${a.name}</b>: ${a.last}`);if(actions.length>50)actions.shift();}
function logEvent(s){events.push(`Day ${day}: ${s}`);if(events.length>80)events.shift();}
function diary(s){diaries.push(`Day ${day}: ${s}`);if(diaries.length>80)diaries.shift();}
function locust(){for(let y=0;y<H;y++)for(let x=0;x<W;x++){let t=tileAt(x,y);if(t.resource>0&&Math.random()<.65)t.resource=Math.max(0,t.resource-5)}logEvent('Locust invasion damaged food resources. River-buffed zones remain valuable.');renderMap();renderSide();}
document.getElementById('pauseBtn').onclick=()=>{paused=!paused;document.getElementById('pauseBtn').textContent=paused?'Resume':'Pause'};document.querySelectorAll('[data-speed]').forEach(b=>b.onclick=()=>{speed=+b.dataset.speed;document.querySelectorAll('[data-speed]').forEach(x=>x.classList.remove('active'));b.classList.add('active');restart()});document.getElementById('locustBtn').onclick=locust;
function restart(){if(timer)clearInterval(timer);timer=setInterval(step,speed)}
initWorld();renderMap();renderSide();restart();
</script>
</body>
</html>
