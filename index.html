<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Island World Master</title>
<style>
  :root{
    --bg:#111;
    --panel:#1c1c1c;
    --line:#333;
    --text:#eee;
    --muted:#aaa;
    --grass:#63aa5d;
    --grass2:#72b96b;
    --sand:#d9c57e;
    --river:#7fd3ff;
    --rock1:#9a9a9a;
    --rock2:#b7b7b7;
    --rock3:#828282;
    --fence:#7a4a22;
    --bridge:#9a6738;
    --garden:#3f8f3f;
    --hut:#c28f54;
    --gate:#b98545;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
    padding:10px;
  }

  #top{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    align-items:center;
  }

  button{
    background:#2d2d2d;
    color:#eee;
    border:1px solid #555;
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
  }

  button:hover{background:#3a3a3a}

  #cards{
    display:flex;
    gap:8px;
    overflow-x:auto;
    margin-bottom:10px;
  }

  .card{
    min-width:180px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px;
    font-size:12px;
  }

  .card-title{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:bold;
    margin-bottom:5px;
  }

  .agent-icon{
    width:24px;
    height:24px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:white;
  }

  .bar{
    height:7px;
    background:#333;
    border-radius:5px;
    overflow:hidden;
    margin:3px 0 6px;
  }

  .fill{
    height:100%;
    background:#bbb;
  }

  #layout{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }

  #map{
    display:grid;
    grid-template-columns:repeat(22, 28px);
    grid-template-rows:repeat(18, 28px);
    gap:1px;
    background:#000;
    border:2px solid #333;
    width:max-content;
  }

  .tile{
    width:28px;
    height:28px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    box-sizing:border-box;
    overflow:hidden;
  }

  .grass{background:var(--grass)}
  .grass.alt{background:var(--grass2)}
  .sand{background:var(--sand)}
  .river{background:var(--river)}
  .rock.r1{background:var(--rock1)}
  .rock.r2{background:var(--rock2)}
  .rock.r3{background:var(--rock3)}
  .bridge{background:var(--bridge)}
  .garden{background:var(--garden)}
  .fence{background:var(--fence)}
  .gate{background:var(--gate)}
  .hut{background:var(--hut)}

  .coord{
    position:absolute;
    top:1px;
    left:2px;
    font-size:7px;
    color:rgba(0,0,0,.55);
    pointer-events:none;
  }

  .landmark{
    position:absolute;
    z-index:3;
    font-size:17px;
    line-height:1;
    pointer-events:none;
    text-shadow:0 1px 1px rgba(0,0,0,.35);
  }

  .fire{
    animation:flicker .45s infinite alternate;
    filter:drop-shadow(0 0 3px #ffb000);
  }

  @keyframes flicker{
    from{transform:scale(.92) rotate(-3deg); opacity:.82}
    to{transform:scale(1.08) rotate(3deg); opacity:1}
  }

  .agent{
    position:absolute;
    z-index:5;
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:bold;
    color:white;
    box-shadow:0 1px 4px rgba(0,0,0,.6);
  }

  .fishPulse::after{
    content:"🐟";
    position:absolute;
    right:0;
    bottom:-1px;
    font-size:11px;
    opacity:.65;
    z-index:2;
  }

  .bountyPulse::after{
    content:"✦";
    position:absolute;
    right:1px;
    bottom:-2px;
    font-size:12px;
    opacity:.7;
    z-index:2;
  }

  #side{
    min-width:270px;
    max-width:420px;
    flex:1;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-size:13px;
  }

  #log{
    height:300px;
    overflow:auto;
    background:#111;
    border:1px solid #333;
    border-radius:8px;
    padding:8px;
    font-size:12px;
  }

  .logline{
    border-bottom:1px solid #222;
    padding:4px 0;
    color:#ddd;
  }

  .muted{color:var(--muted)}
</style>
</head>
<body>
  <div id="top">
    <strong>Island World Master</strong>
    <span>Day: <b id="day">1</b></span>
    <span>Tick: <b id="tick">0</b></span>
    <span>Fish Schools: <b id="fishCount">0</b></span>
    <span>Food Bounties: <b id="bountyCount">0</b></span>
    <button id="pauseBtn">Pause</button>
    <button id="stepBtn">Step</button>
    <button id="resetBtn">Reset</button>
    <span class="muted">Directory is internal only. No visible directory panel.</span>
  </div>

  <div id="cards"></div>

  <div id="layout">
    <div id="map"></div>
    <div id="side">
      <h3>Event Log</h3>
      <div id="log"></div>
      <p class="muted">
        Legend: 🛖 hut, 🔥 campfire, 🌱 garden, 🚪 gate, brown tiles bridge/fence,
        sky blue river no-go, gray rocky shore may host fish schools.
      </p>
    </div>
  </div>

<script>
const W = 22;
const H = 18;
const DAY_TICKS = 80;

let tick = 0;
let day = 1;
let paused = false;
let timer = null;

const colors = ["#e84c3d","#3498db","#9b59b6","#f39c12","#1abc9c","#e67e22","#2ecc71","#ff66aa"];

const T = {
  GRASS:"grass",
  SAND:"sand",
  RIVER:"river",
  ROCK:"rock",
  BRIDGE:"bridge",
  HUT:"hut",
  GARDEN:"garden",
  FENCE:"fence",
  GATE:"gate"
};

const TILE = [];
let agents = [];
let eventLog = [];
let fishSchools = [];
let foodBounties = [];

/*
  INTERNAL DIRECTORY ONLY.
  This is intentionally not displayed as a UI panel.
  Agents use it for discovery, memory, and social sharing.
*/
const internalDirectory = {
  landmarks: [],
  terrain: [],
  structures: [],
  dynamic: []
};

function key(x,y){return `${x},${y}`;}
function inBounds(x,y){return x>=0 && x<W && y>=0 && y<H;}
function dist(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function chance(p){return Math.random()<p;}

function log(msg){
  eventLog.unshift(`Day ${day}: ${msg}`);
  eventLog = eventLog.slice(0,80);
}

function makeWorld(){
  TILE.length = 0;
  for(let y=0;y<H;y++){
    TILE[y] = [];
    for(let x=0;x<W;x++){
      TILE[y][x] = {
        x,y,
        type:T.GRASS,
        walkable:true,
        variant:chance(.18) ? "alt" : "",
        overlay:null,
        landmark:null,
        fishActive:false,
        bountyActive:false
      };
    }
  }

  // River: 2-wide for main vertical run, last bend can narrow.
  const riverCoords = [
    [8,3],[9,3],
    [8,4],[9,4],
    [8,5],[9,5],
    [8,6],[9,6],
    [8,7],[9,7],
    [7,8]
  ];

  for(const [x,y] of riverCoords){
    setTile(x,y,T.RIVER,false);
  }

  // Bridge halfway through river. Bridge overrides river and is walkable.
  [[8,5],[9,5],[8,6],[9,6]].forEach(([x,y])=>{
    setTile(x,y,T.BRIDGE,true);
  });

  // Sandy banks next to river and bridge.
  for(const [x,y] of riverCoords){
    for(const n of neighbors8(x,y)){
      if(get(n.x,n.y).type === T.GRASS) setTile(n.x,n.y,T.SAND,true);
    }
  }

  // Rocky shore 1-3 random tiles around water/banks.
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const t = get(x,y);
      if(t.type === T.GRASS){
        const nearWater = nearbyType(x,y,T.RIVER,3) || nearbyType(x,y,T.BRIDGE,2);
        const nearSand = nearbyType(x,y,T.SAND,2);
        if((nearWater || nearSand) && chance(.45)){
          setTile(x,y,T.ROCK,true);
          t.variant = ["r1","r2","r3"][randInt(0,2)];
        }
      }
    }
  }

  // Beach huts.
  placeLandmark("North Beach Hut", "Hut", T.HUT, 3, 3, "🛖");
  placeLandmark("South Beach Hut", "Hut", T.HUT, 4, 14, "🛖");

  // Campfire overlay: does NOT change tile background.
  // It sits on the existing terrain tile, avoiding the black background problem.
  setOverlayLandmark("Central Campfire", "Campfire", 5, 8, "🔥", "fire");

  // Fenced garden with two-tile gate.
  buildGardenCompound();

  // Internal directory entries.
  addDirectoryEntries();

  // Dynamic resources.
  spawnFishSchool(true);
  spawnFoodBounty(true);
}

function get(x,y){return TILE[y][x];}

function setTile(x,y,type,walkable){
  if(!inBounds(x,y)) return;
  const t = get(x,y);
  t.type = type;
  t.walkable = walkable;
}

function neighbors4(x,y){
  return [{x:x+1,y},{x:x-1,y},{x,y:y+1},{x,y:y-1}].filter(p=>inBounds(p.x,p.y));
}

function neighbors8(x,y){
  const out=[];
  for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
    if(dx||dy){
      const nx=x+dx, ny=y+dy;
      if(inBounds(nx,ny)) out.push({x:nx,y:ny});
    }
  }
  return out;
}

function nearbyType(x,y,type,r){
  for(let yy=y-r;yy<=y+r;yy++){
    for(let xx=x-r;xx<=x+r;xx++){
      if(inBounds(xx,yy) && Math.abs(xx-x)+Math.abs(yy-y)<=r && get(xx,yy).type===type) return true;
    }
  }
  return false;
}

function placeLandmark(name, kind, type, x, y, icon){
  setTile(x,y,type,true);
  get(x,y).landmark = {name, kind, icon};
}

function setOverlayLandmark(name, kind, x, y, icon, cls){
  const t = get(x,y);
  t.overlay = {name, kind, icon, cls};
  t.landmark = {name, kind, icon};
}

function buildGardenCompound(){
  // Fence rectangle from x 13-19, y 4-11. Gate at x13 y7/y8.
  for(let x=13;x<=19;x++){
    setTile(x,4,T.FENCE,false);
    setTile(x,11,T.FENCE,false);
  }
  for(let y=4;y<=11;y++){
    setTile(13,y,T.FENCE,false);
    setTile(19,y,T.FENCE,false);
  }

  // Two-tile open gate.
  [[13,7],[13,8]].forEach(([x,y])=>{
    setTile(x,y,T.GATE,true);
    get(x,y).landmark = {name:"Garden Gate", kind:"Gate", icon:"🚪"};
  });

  // Garden tiles inside.
  for(let y=6;y<=9;y++){
    for(let x=15;x<=17;x++){
      setTile(x,y,T.GARDEN,true);
      get(x,y).landmark = {name:"Garden", kind:"Garden", icon:"🌱"};
    }
  }
}

function addDirectoryEntries(){
  internalDirectory.landmarks = [
    {title:"Hut", category:"Landmark", purpose:"Socialization, rest, information sharing", memoryImportance:"Very High"},
    {title:"Campfire", category:"Landmark", purpose:"Gathering place and emotional/social center", memoryImportance:"Very High"},
    {title:"Garden", category:"Landmark", purpose:"Permanent high-yield food source with regrowth", memoryImportance:"Very High"},
    {title:"Bridge", category:"Landmark", purpose:"Only crossing over river", memoryImportance:"Very High"},
    {title:"Gate", category:"Landmark", purpose:"Only entry into fenced garden area", memoryImportance:"High"}
  ];

  internalDirectory.structures = [
    {title:"Fence", category:"Structure", walkable:false, purpose:"Blocks direct garden access"}
  ];

  internalDirectory.terrain = [
    {title:"River", category:"Terrain", walkable:false, purpose:"No-go water barrier"},
    {title:"Sandy Bank", category:"Terrain", walkable:true, purpose:"Cosmetic shore/riverside terrain"},
    {title:"Rocky Shore", category:"Terrain", walkable:true, purpose:"Can host low-yield fish schools"},
    {title:"Grassland", category:"Terrain", walkable:true, purpose:"Default traversable terrain"}
  ];

  internalDirectory.dynamic = [
    {title:"Fish School", category:"Dynamic Resource", durationDays:60, yield:"+3 to +5", shareable:true},
    {title:"Food Bounty", category:"Dynamic Resource", durationDays:30, radius:2, yield:"+6 to +10", shareable:true},
    {title:"Drought Zone", category:"Environment Change", durationDays:"30 to 90", shareable:true},
    {title:"Resource-Rich Area", category:"Environment Change", shareable:true},
    {title:"Resource-Poor Area", category:"Environment Change", shareable:true},
    {title:"Agent Sighting", category:"Social Knowledge", shareable:true}
  ];
}

function makeAgents(){
  agents = [];
  const starts = [{x:2,y:2},{x:6,y:3},{x:2,y:13},{x:12,y:13},{x:18,y:14},{x:20,y:6}];
  for(let i=0;i<6;i++){
    agents.push({
      id:i+1,
      x:starts[i].x,
      y:starts[i].y,
      color:colors[i],
      food:60,
      social:40+randInt(0,30),
      energy:70,
      target:null,
      memory:[],
      known: new Set(),
      mode:"exploring"
    });
  }
}

function walkable(x,y){
  return inBounds(x,y) && get(x,y).walkable;
}

function chooseTarget(a){
  // Hungry agents prefer known food.
  if(a.food < 45){
    const liveFood = a.memory.filter(m=>m.expiresDay >= day && (m.type==="fish" || m.type==="bounty" || m.type==="garden"));
    if(liveFood.length){
      const m = liveFood[randInt(0,liveFood.length-1)];
      a.target = {x:m.x,y:m.y, reason:m.type};
      return;
    }
    // Otherwise garden if known or random garden.
    a.target = {x:16,y:7, reason:"garden"};
    return;
  }

  // Lonely agents prefer huts or campfire.
  if(a.social < 45){
    const socialTargets = [{x:3,y:3,reason:"hut"},{x:4,y:14,reason:"hut"},{x:5,y:8,reason:"campfire"}];
    a.target = socialTargets[randInt(0,socialTargets.length-1)];
    return;
  }

  // Sometimes cross the bridge.
  if(chance(.2)){
    a.target = {x:8+randInt(0,1), y:5+randInt(0,1), reason:"bridge"};
    return;
  }

  // Random exploration.
  let tries=0;
  while(tries++<100){
    const x=randInt(0,W-1), y=randInt(0,H-1);
    if(walkable(x,y)){
      a.target={x,y,reason:"explore"};
      return;
    }
  }
}

function stepToward(a){
  if(!a.target || (a.x===a.target.x && a.y===a.target.y)) chooseTarget(a);
  if(!a.target) return;

  const options = neighbors4(a.x,a.y).filter(p=>walkable(p.x,p.y));
  options.sort((p,q)=>dist(p,a.target)-dist(q,a.target));

  // Mostly move toward target, sometimes wander.
  let move = options[0];
  if(chance(.18)) move = options[randInt(0,options.length-1)];
  if(move){
    a.x=move.x; a.y=move.y;
  }
}

function agentDiscover(a){
  const t = get(a.x,a.y);

  // Landmark discovery.
  if(t.landmark){
    remember(a, {
      type:"landmark",
      title:t.landmark.kind,
      name:t.landmark.name,
      x:a.x,y:a.y,
      confidence:100,
      expiresDay:day+120,
      shareable:true
    });
  }

  if(t.overlay){
    remember(a, {
      type:"landmark",
      title:t.overlay.kind,
      name:t.overlay.name,
      x:a.x,y:a.y,
      confidence:100,
      expiresDay:day+120,
      shareable:true
    });
  }

  // Garden food: high yield but chance-based.
  if(t.type===T.GARDEN && chance(.12)){
    const gain = randInt(15,20);
    a.food = Math.min(100,a.food+gain);
    remember(a,{type:"garden", title:"Garden", x:a.x,y:a.y, confidence:100, expiresDay:day+120, shareable:true});
    log(`Agent ${a.id} harvested garden food (+${gain}).`);
  }

  // Fish schools: low bonus, 60-day duration, rocky shore only.
  for(const fs of fishSchools){
    if(fs.active && day <= fs.endDay && manhattan(a.x,a.y,fs.x,fs.y)<=fs.radius && t.type===T.ROCK){
      t.fishActive = true;
      remember(a,{type:"fish", title:fs.name, x:fs.x,y:fs.y, confidence:100, expiresDay:fs.endDay, shareable:true});
      if(chance(fs.catchChance)){
        const gain = randInt(3,5);
        a.food = Math.min(100,a.food+gain);
        log(`Agent ${a.id} caught fish at ${fs.name} (+${gain}).`);
      }
    }
  }

  // Food bounty: 30-day radius 2, medium yield.
  for(const b of foodBounties){
    if(b.active && day <= b.endDay && manhattan(a.x,a.y,b.x,b.y)<=b.radius){
      t.bountyActive = true;
      remember(a,{type:"bounty", title:b.name, x:b.x,y:b.y, confidence:100, expiresDay:b.endDay, shareable:true});
      if(chance(b.findChance)){
        const gain = randInt(6,10);
        a.food = Math.min(100,a.food+gain);
        log(`Agent ${a.id} found food bounty at ${b.name} (+${gain}).`);
      }
    }
  }
}

function manhattan(x1,y1,x2,y2){return Math.abs(x1-x2)+Math.abs(y1-y2);}

function remember(a,m){
  const id = `${m.type}:${m.x},${m.y}:${m.title}`;
  if(!a.known.has(id)){
    a.known.add(id);
    a.memory.push({...m, id, learnedDay:day});
    if(m.type !== "landmark" || chance(.35)){
      log(`Agent ${a.id} learned: ${m.title}.`);
    }
  }else{
    const old = a.memory.find(mm=>mm.id===id);
    if(old){
      old.confidence = 100;
      old.expiresDay = Math.max(old.expiresDay,m.expiresDay);
      old.learnedDay = day;
    }
  }
}

function socialShare(){
  for(let i=0;i<agents.length;i++){
    for(let j=i+1;j<agents.length;j++){
      const a=agents[i], b=agents[j];
      const near = manhattan(a.x,a.y,b.x,b.y)<=1;
      const atSocial =
        nearSocialPlace(a.x,a.y) && nearSocialPlace(b.x,b.y) &&
        manhattan(a.x,b.x,a.y,b.y);
      const inHutRadius = isNearKind(a,"Hut",2) && isNearKind(b,"Hut",2);
      const inCampfireRadius = manhattan(a.x,a.y,5,8)<=2 && manhattan(b.x,b.y,5,8)<=2;

      if(near && (inHutRadius || inCampfireRadius)){
        shareUseful(a,b);
        shareUseful(b,a);
        a.social = Math.min(100,a.social+8);
        b.social = Math.min(100,b.social+8);
      }
    }
  }
}

function nearSocialPlace(x,y){
  return manhattan(x,y,3,3)<=2 || manhattan(x,y,4,14)<=2 || manhattan(x,y,5,8)<=2;
}

function isNearKind(a,kind,r){
  for(let yy=a.y-r;yy<=a.y+r;yy++){
    for(let xx=a.x-r;xx<=a.x+r;xx++){
      if(inBounds(xx,yy) && get(xx,yy).landmark?.kind===kind && manhattan(a.x,a.y,xx,yy)<=r) return true;
    }
  }
  return false;
}

function shareUseful(from,to){
  const useful = from.memory.filter(m=>m.shareable && m.expiresDay>=day && !to.known.has(m.id));
  if(!useful.length) return;
  useful.sort((a,b)=>priority(b)-priority(a));
  const m = useful[0];
  to.known.add(m.id);
  to.memory.push({...m, confidence:Math.max(60,m.confidence-15), learnedDay:day, heardFrom:from.id});
  log(`Agent ${from.id} shared ${m.title} with Agent ${to.id}.`);
}

function priority(m){
  if(m.type==="fish") return 80;
  if(m.type==="bounty") return 75;
  if(m.type==="garden") return 90;
  if(m.title==="Bridge") return 95;
  if(m.title==="Gate") return 85;
  if(m.title==="Hut") return 80;
  return 50;
}

function decayMemory(){
  for(const a of agents){
    for(const m of a.memory){
      const age = day - m.learnedDay;
      if(age > 20 && m.expiresDay < day+100){
        m.confidence = Math.max(0, 100 - (age-20)*5);
      }
    }
    a.memory = a.memory.filter(m=>m.confidence>0 && (m.expiresDay>=day || m.type==="landmark"));
  }
}

function updateEvents(){
  for(const fs of fishSchools){
    if(fs.active && day > fs.endDay){
      fs.active=false;
      log(`${fs.name} ended.`);
    }
  }

  for(const b of foodBounties){
    if(b.active && day > b.endDay){
      b.active=false;
      log(`${b.name} ended.`);
    }
  }

  // Keep the world lively but not crowded.
  if(fishSchools.filter(f=>f.active).length < 1 && chance(.04)) spawnFishSchool(false);
  if(foodBounties.filter(b=>b.active).length < 1 && chance(.06)) spawnFoodBounty(false);
}

function spawnFishSchool(initial){
  const rocks = [];
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      if(get(x,y).type===T.ROCK) rocks.push({x,y});
    }
  }
  if(!rocks.length) return;
  const p = rocks[randInt(0,rocks.length-1)];
  const names = ["North Rocky Fish Run", "East Bank Fish Run", "Southern Rock Fish Run", "Bridge Rock Fish Run"];
  const fs = {
    name:names[randInt(0,names.length-1)],
    x:p.x,y:p.y,
    radius:2,
    startDay:day,
    endDay:day+60,
    active:true,
    catchChance:.14
  };
  fishSchools.push(fs);
  if(!initial) log(`${fs.name} appeared along the rocky shore.`);
}

function spawnFoodBounty(initial){
  let p=null;
  for(let tries=0;tries<200;tries++){
    const x=randInt(1,W-2), y=randInt(1,H-2);
    if(walkable(x,y) && ![T.RIVER,T.BRIDGE,T.FENCE,T.GATE].includes(get(x,y).type)){
      p={x,y}; break;
    }
  }
  if(!p) return;
  const names = ["Berry Bounty", "Fruit Bounty", "Mushroom Bloom", "Wild Food Patch"];
  const b = {
    name:names[randInt(0,names.length-1)],
    x:p.x,y:p.y,
    radius:2,
    startDay:day,
    endDay:day+30,
    active:true,
    findChance:.18
  };
  foodBounties.push(b);
  if(!initial) log(`${b.name} appeared.`);
}

function updateAgents(){
  for(const a of agents){
    a.food = Math.max(0,a.food-.08);
    a.energy = Math.max(0,a.energy-.04);
    a.social = Math.max(0,a.social-.05);

    stepToward(a);
    agentDiscover(a);

    if(a.food < 25 || a.energy < 20 || a.social < 25){
      a.mode = "seeking";
    }else{
      a.mode = "exploring";
    }

    if(a.food <= 0){
      a.food = 20;
      log(`Agent ${a.id} recovered from hunger at a hut.`);
      a.x = chance(.5) ? 3 : 4;
      a.y = a.x===3 ? 3 : 14;
    }
  }

  socialShare();
}

function render(){
  document.getElementById("day").textContent = day;
  document.getElementById("tick").textContent = tick;
  document.getElementById("fishCount").textContent = fishSchools.filter(f=>f.active).length;
  document.getElementById("bountyCount").textContent = foodBounties.filter(b=>b.active).length;

  // Refresh dynamic markers.
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    get(x,y).fishActive = false;
    get(x,y).bountyActive = false;
  }
  for(const fs of fishSchools.filter(f=>f.active && day<=f.endDay)){
    for(let y=fs.y-fs.radius;y<=fs.y+fs.radius;y++){
      for(let x=fs.x-fs.radius;x<=fs.x+fs.radius;x++){
        if(inBounds(x,y) && manhattan(x,y,fs.x,fs.y)<=fs.radius && get(x,y).type===T.ROCK){
          get(x,y).fishActive = true;
        }
      }
    }
  }
  for(const b of foodBounties.filter(bb=>bb.active && day<=bb.endDay)){
    for(let y=b.y-b.radius;y<=b.y+b.radius;y++){
      for(let x=b.x-b.radius;x<=b.x+b.radius;x++){
        if(inBounds(x,y) && manhattan(x,y,b.x,b.y)<=b.radius && walkable(x,y)){
          get(x,y).bountyActive = true;
        }
      }
    }
  }

  const map = document.getElementById("map");
  map.innerHTML = "";
  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const t = get(x,y);
      const d = document.createElement("div");
      d.className = `tile ${tileClass(t)}`;
      if(t.fishActive) d.classList.add("fishPulse");
      if(t.bountyActive) d.classList.add("bountyPulse");

      const coord = document.createElement("div");
      coord.className = "coord";
      coord.textContent = `${String(x).padStart(2,"0")},${String(y).padStart(2,"0")}`;
      d.appendChild(coord);

      if(t.landmark && t.landmark.icon && !["Garden"].includes(t.landmark.kind)){
        const lm = document.createElement("div");
        lm.className = "landmark";
        lm.textContent = t.landmark.icon;
        d.appendChild(lm);
      }

      if(t.type===T.GARDEN){
        const lm = document.createElement("div");
        lm.className = "landmark";
        lm.textContent = "🌱";
        d.appendChild(lm);
      }

      if(t.overlay){
        const ov = document.createElement("div");
        ov.className = `landmark ${t.overlay.cls || ""}`;
        ov.textContent = t.overlay.icon;
        d.appendChild(ov);
      }

      for(const a of agents.filter(aa=>aa.x===x && aa.y===y)){
        const e = document.createElement("div");
        e.className = "agent";
        e.style.background = a.color;
        e.textContent = a.id;
        d.appendChild(e);
      }

      map.appendChild(d);
    }
  }

  renderCards();
  renderLog();
}

function tileClass(t){
  if(t.type===T.GRASS) return `grass ${t.variant}`;
  if(t.type===T.SAND) return "sand";
  if(t.type===T.RIVER) return "river";
  if(t.type===T.ROCK) return `rock ${t.variant || "r1"}`;
  if(t.type===T.BRIDGE) return "bridge";
  if(t.type===T.HUT) return "hut";
  if(t.type===T.GARDEN) return "garden";
  if(t.type===T.FENCE) return "fence";
  if(t.type===T.GATE) return "gate";
  return "grass";
}

function renderCards(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  for(const a of agents){
    const c = document.createElement("div");
    c.className = "card";
    const latest = a.memory.slice(-3).map(m=>m.title).join(", ") || "None";
    c.innerHTML = `
      <div class="card-title"><span class="agent-icon" style="background:${a.color}">${a.id}</span> Agent ${a.id}</div>
      Food
      <div class="bar"><div class="fill" style="width:${a.food}%"></div></div>
      Social
      <div class="bar"><div class="fill" style="width:${a.social}%"></div></div>
      Energy
      <div class="bar"><div class="fill" style="width:${a.energy}%"></div></div>
      <div>Mode: ${a.mode}</div>
      <div>Known: ${a.memory.length}</div>
      <div class="muted">Recent: ${latest}</div>
    `;
    cards.appendChild(c);
  }
}

function renderLog(){
  const box = document.getElementById("log");
  box.innerHTML = eventLog.map(l=>`<div class="logline">${l}</div>`).join("");
}

function gameTick(){
  if(paused) return;
  tick++;
  if(tick % DAY_TICKS === 0){
    day++;
    decayMemory();
    updateEvents();
  }
  updateAgents();
  render();
}

function reset(){
  tick = 0;
  day = 1;
  eventLog = [];
  fishSchools = [];
  foodBounties = [];
  makeWorld();
  makeAgents();
  log("Simulation started.");
  render();
}

document.getElementById("pauseBtn").onclick = () => {
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "Resume" : "Pause";
};
document.getElementById("stepBtn").onclick = () => {
  const was = paused;
  paused = false;
  gameTick();
  paused = was;
};
document.getElementById("resetBtn").onclick = reset;

reset();
timer = setInterval(gameTick, 170);
</script>
</body>
</html>
